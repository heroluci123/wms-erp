name: Build and Release

on:
  push:
    tags:
      - 'v*' # Dispara o build apenas quando criarmos uma tag começando com "v" (ex: v1.0.1)

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build & Publish Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release
